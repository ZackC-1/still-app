<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Still — calm your browser</title>
<meta name="description" content="Still removes short-form video — Shorts, Reels, and all of TikTok.">
<style>
  :root { --ink:#0b1020; --muted:#5b6478; --blue:#3457d5; --line:#e7e9f0; --bg:#ffffff; }
  * { box-sizing:border-box; }
  body { margin:0; font:16px/1.6 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:var(--bg); }
  .wrap { max-width:680px; margin:0 auto; padding:64px 22px; }
  .mark { font-weight:600; font-size:26px; letter-spacing:-0.02em; }
  .dot { color:var(--blue); }
  h1 { font-size:34px; letter-spacing:-0.02em; margin:28px 0 10px; }
  p.lead { font-size:18px; color:var(--muted); margin:0 0 28px; }
  nav { display:flex; flex-wrap:wrap; gap:14px; margin-top:28px; }
  nav a { color:var(--blue); text-decoration:none; font-weight:500; border:1px solid var(--line); padding:9px 14px; border-radius:9px; }
  nav a:hover { background:#f5f7ff; }
  footer { margin-top:48px; color:var(--muted); font-size:14px; border-top:1px solid var(--line); padding-top:18px; }
  a { color:var(--blue); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">st<span class="dot">·</span>ll</div>
    <h1>Calm your browser.</h1>
    <p class="lead">Still removes short-form video — Shorts, Reels, and all of TikTok — so the web stops pulling at your attention.</p>
    <nav>
      <a href="privacy/">Privacy Policy</a>
      <a href="terms/">Terms &amp; Conditions</a>
      <a href="support/">Support</a>
    </nav>
    <footer>© 2026 Cadmus Labs LLC · <a href="mailto:zack@cadmuslabs.co">zack@cadmuslabs.co</a></footer>
  </div>
</body>
</html>

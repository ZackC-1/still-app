packages:
  - "packages/*"

# Supply-chain "release-age cooldown": the GitHub runner enforces a 1-day minimumReleaseAge,
# which rejects any dependency published within the last 24h (e.g. a same-day svelte/wxt patch)
# and would make the autonomous /loop's CI fail on wall-clock, not on anything real. We disable
# the age heuristic here: the lockfile already pins exact versions + integrity hashes (the actual
# tamper protection), and branch protection + secret scanning are the enforced guardrails (KTD12).
# Revisit if a stricter supply-chain posture is wanted.
minimumReleaseAge: 0

# esbuild needs its postinstall to fetch the platform binary (used by Vite/WXT/Vitest).
# spawn-sync is a transitive build helper; harmless to allow.
allowBuilds:
  esbuild: true
  spawn-sync: true

# ext-firefox is scaffold-only (deferred); it has no package.json yet, so pnpm skips it.

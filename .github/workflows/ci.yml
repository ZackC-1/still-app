name: CI

# The autonomous /loop's commits run against this. It must be green before merge to main.
# No deploy steps here — Supabase/Apple deploys are human-gated (see docs/CONNECTIONS.md).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (the loop pushes frequently).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: lint · typecheck · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Unit tests
        run: pnpm -r --if-present test

      - name: Build (produces both extension dist/ folders)
        run: pnpm -r --if-present build

  e2e:
    name: Playwright on fixtures
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extensions
        run: pnpm -r --if-present build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright fixture tests (gating)
        run: pnpm exec playwright test --project=fixtures

      # The real-site smoke layer is intentionally NOT run here — it is non-gating
      # and lives in a separate, retry-allowed job (KTD10). It must never block merge.
